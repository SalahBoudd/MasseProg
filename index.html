<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MassePro Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:sans-serif}
.container{padding:15px}
.card{background:#1c1c1c;padding:15px;border-radius:12px;margin-bottom:10px}
button{padding:10px;border:none;border-radius:8px;background:#c8f55a;color:black;font-weight:bold}
input{width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white}
.progress{height:8px;background:#333;border-radius:5px;margin-top:5px}
.bar{height:100%;background:#c8f55a;border-radius:5px}
</style>
</head>

<body>

<div class="container">

<h2>MassePro 💪</h2>

<div class="card">
Calories: <span id="kcal">0</span> / 2700
<div class="progress"><div id="bar-kcal" class="bar"></div></div>

Protéines: <span id="prot">0</span> / 120g
<div class="progress"><div id="bar-prot" class="bar"></div></div>
</div>

<div class="card">
<h3>Ajouter repas (IA)</h3>
<input id="food" placeholder="ex: riz poulet">
<button onclick="addFood()">Ajouter</button>
</div>

<div class="card">
<h3>Poids</h3>
<input id="weight" placeholder="53">
<button onclick="saveWeight()">Save</button>
<canvas id="chart"></canvas>
</div>

</div>

<script>

// ===== STORAGE SAFE =====
let state;
try{
  state = JSON.parse(localStorage.getItem("mp")) || {};
}catch{
  state = {};
}

if(!state.kcal) state.kcal=0;
if(!state.prot) state.prot=0;
if(!state.weights) state.weights=[];

function save(){
  localStorage.setItem("mp", JSON.stringify(state));
}

// ===== IA NUTRITION (SIMPLIFIÉE MAIS EFFICACE) =====
const foodDB = {
  "riz": {kcal:130,prot:2},
  "poulet": {kcal:165,prot:31},
  "oeuf": {kcal:70,prot:6},
  "avoine": {kcal:380,prot:13},
  "whey": {kcal:120,prot:24},
  "banane": {kcal:90,prot:1},
  "fromage": {kcal:300,prot:20}
};

function estimateFood(text){
  let kcal=0,prot=0;

  Object.keys(foodDB).forEach(f=>{
    if(text.toLowerCase().includes(f)){
      kcal += foodDB[f].kcal;
      prot += foodDB[f].prot;
    }
  });

  return {kcal,prot};
}

function addFood(){
  const text = document.getElementById("food").value;
  const est = estimateFood(text);

  state.kcal += est.kcal;
  state.prot += est.prot;

  save();
  updateUI();
}

// ===== UI =====
function updateUI(){
  document.getElementById("kcal").innerText = state.kcal;
  document.getElementById("prot").innerText = state.prot;

  document.getElementById("bar-kcal").style.width =
    Math.min(100, state.kcal/2700*100)+"%";

  document.getElementById("bar-prot").style.width =
    Math.min(100, state.prot/120*100)+"%";
}

// ===== CHART =====
let chart;

function renderChart(){
  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels: state.weights.map(w=>w.date),
      datasets:[{
        data: state.weights.map(w=>w.value),
        fill:true,
        tension:0.3
      }]
    }
  });
}

function saveWeight(){
  const val = parseFloat(document.getElementById("weight").value);
  if(!val) return;

  state.weights.push({
    date: new Date().toLocaleDateString(),
    value: val
  });

  save();
  renderChart();
}

// ===== NOTIFICATIONS =====
if("Notification" in window){
  Notification.requestPermission().then(p=>{
    if(p==="granted"){
      setTimeout(()=>{
        new Notification("🍽️ MassePro","Pense à manger !");
      },8000);
    }
  });
}

updateUI();
renderChart();

</script>

</body>
</html>
